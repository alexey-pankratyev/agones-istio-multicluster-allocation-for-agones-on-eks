apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  labels:
    cluster: eks
    provider: aws
  annotations:
    version: v0.1.0
  name: xkubernetes-aws
spec:
  compositeTypeRef:
    apiVersion: demo.crossplane.io/v1alpha1
    kind: XKubernetesCluster
  mode: Pipeline
  pipeline:

  # ─────────────────────────────────────────────────────────────────────────────
  # Step 1: VPC — create a new VPC when vpcId is not provided in parameters.
  # The nested XVPC composite resource creates the VPC, subnets, IGW, NAT GWs
  # and route tables. Its resource name is stable so the EKS step can reference
  # its status fields once it becomes ready.
  # ─────────────────────────────────────────────────────────────────────────────
  - step: CreateVPC
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{- $spec := .observed.composite.resource.spec }}
          {{- $id := $spec.id }}
          {{- $params := $spec.parameters }}
          {{- $vpcParam := get $params "vpc" | default dict }}
          {{- $existingVpcId := get $params "vpcId" | default "" }}

          {{- if not $existingVpcId }}
          ---
          # Nested VPC XR — creates VPC, subnets, IGW, NAT GWs, route tables.
          apiVersion: demo.crossplane.io/v1alpha1
          kind: XVPC
          metadata:
            name: {{ $id }}-vpc
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-vpc-xr
          spec:
            id: {{ $id }}
            parameters:
              region: {{ $params.region }}
              cidr: {{ index $vpcParam "cidr" | default "10.100.0.0/16" }}
              availabilityZones: {{ index $vpcParam "availabilityZones" | default (list (print $params.region "a") (print $params.region "b")) | toJson }}
          {{- end }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Step 2: Base EKS infra — cluster, IAM, node group, addons, Karpenter.
  # Subnet IDs are taken from explicit parameters when provided; otherwise they
  # are resolved from the XVPC status written by Step 1.
  # ─────────────────────────────────────────────────────────────────────────────
  - step: CreateBaseInfra
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{- $spec := .observed.composite.resource.spec }}
          {{- $id := $spec.id }}
          {{- $params := $spec.parameters }}
          {{- $vpcParam := get $params "vpc" | default dict }}
          {{- $existingVpcId := get $params "vpcId" | default "" }}

          {{- /* Resolve networking from XVPC status or explicit params */ -}}
          {{- $vpcId := $existingVpcId }}
          {{- $subnetIds := get $params "subnetIds" | default list }}
          {{- $subnetPrivateIds := get $params "subnetPrivateIds" | default list }}
          {{- $subnetPublicIds := get $params "subnetPublicIds" | default list }}
          {{- $azs := index $vpcParam "availabilityZones" | default (list (print $params.region "a") (print $params.region "b")) }}

          {{- if not $existingVpcId }}
            {{- /* Build subnet resource names from the vpc package naming convention */ -}}
            {{- range $i, $az := $azs }}
              {{- $subnetPrivateIds = append $subnetPrivateIds (print $id "-subnet-private-" $i) }}
              {{- $subnetPublicIds = append $subnetPublicIds (print $id "-subnet-public-" $i) }}
            {{- end }}
            {{- $subnetIds = concat $subnetPrivateIds $subnetPublicIds }}
          {{- end }}

          {{- /* For Karpenter subnet selectors: first AZ */ -}}
          {{- $firstAz := index $azs 0 }}
          {{- $agones := get $params "agones" | default dict }}
          {{- $subnetSelectorPrivate := index $agones "vpcSubnetSelectorPrivate" | default $firstAz }}
          {{- $subnetSelectorPublic := index $agones "vpcSubnetSelectorPublic" | default (print $firstAz "-public") }}

          {{- /* Read all EKS cluster status fields needed throughout the template.
               All are empty on cycle 1 (cluster not yet created) and populated from cycle 2 onward. */ -}}
          {{- $clusterStatusRes := get .observed.resources (print $id "-ekscluster") | default dict }}
          {{- $eksAtProvider := dict }}
          {{- if and $clusterStatusRes $clusterStatusRes.resource $clusterStatusRes.resource.status $clusterStatusRes.resource.status.atProvider }}
            {{- $eksAtProvider = $clusterStatusRes.resource.status.atProvider }}
          {{- end }}

          {{- /* OIDC issuer — used for Karpenter IRSA, Agones SDK IRSA */ -}}
          {{- $oidcFull := index $eksAtProvider "identity" | default list | first | default dict | dig "oidc" list | first | default dict | dig "issuer" "" }}
          {{- $oidc := trimPrefix "https://" $oidcFull }}

          {{- /* Cluster endpoint and CA — used for Istio XIstio nested XR */ -}}
          {{- $endpoint := index $eksAtProvider "endpoint" | default "" }}
          {{- $caData := index $eksAtProvider "certificateAuthority" | default list | first | default dict | dig "data" "" }}

          {{- /* VPC ID — from explicit param or from EKS cluster vpcConfig status */ -}}
          {{- $vpcId := get $params "vpcId" | default "" }}
          {{- if not $vpcId }}
            {{- $vpcId = index $eksAtProvider "vpcConfig" | default dict | dig "vpcId" "" }}
          {{- end }}
          ---
          # EKS control-plane IAM role
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: Role
          metadata:
            name: {{ $id }}-controlplane
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-controlplane
          spec:
            forProvider:
              assumeRolePolicy: |
                {
                  "Version": "2012-10-17",
                  "Statement": [{
                    "Effect": "Allow",
                    "Principal": {"Service": ["eks.amazonaws.com"]},
                    "Action": ["sts:AssumeRole","sts:TagSession"]
                  }]
                }
          ---
          # Node IAM role
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: Role
          metadata:
            name: {{ $id }}-nodegroup
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-nodegroup
          spec:
            forProvider:
              assumeRolePolicy: |
                {
                  "Version": "2012-10-17",
                  "Statement": [{
                    "Effect": "Allow",
                    "Principal": {"Service": ["ec2.amazonaws.com"]},
                    "Action": ["sts:AssumeRole"]
                  }]
                }
          ---
          # AmazonEKSClusterPolicy
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: RolePolicyAttachment
          metadata:
            name: {{ $id }}-controlplane-ekspolicy
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-controlplane-ekspolicy
          spec:
            forProvider:
              policyArn: arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
              roleRef:
                name: {{ $id }}-controlplane
          ---
          # AmazonEKSWorkerNodePolicy
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: RolePolicyAttachment
          metadata:
            name: {{ $id }}-node-worker
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-node-worker
          spec:
            forProvider:
              policyArn: arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
              roleRef:
                name: {{ $id }}-nodegroup
          ---
          # AmazonEKS_CNI_Policy
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: RolePolicyAttachment
          metadata:
            name: {{ $id }}-node-cni
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-node-cni
          spec:
            forProvider:
              policyArn: arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
              roleRef:
                name: {{ $id }}-nodegroup
          ---
          # AmazonEC2ContainerRegistryReadOnly
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: RolePolicyAttachment
          metadata:
            name: {{ $id }}-node-ecr
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-node-ecr
          spec:
            forProvider:
              policyArn: arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
              roleRef:
                name: {{ $id }}-nodegroup
          {{- if $oidc }}
          ---
          # OIDC Identity Provider — registers the EKS cluster OIDC issuer in IAM
          # so STS can validate tokens for AssumeRoleWithWebIdentity (IRSA).
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: OpenIDConnectProvider
          metadata:
            name: {{ $id }}-oidc-provider
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-oidc-provider
          spec:
            forProvider:
              url: https://{{ $oidc }}
              clientIdList:
              - sts.amazonaws.com
              thumbprintList:
              - "9e99a48a9960b14926bb7f3b02e22da2b0ab7280"
          ---
          # Karpenter IAM Role (IRSA) — allows Karpenter to call EC2/SQS/IAM APIs.
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: Role
          metadata:
            name: {{ $id }}-karpenter
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-role-karpenter
          spec:
            forProvider:
              assumeRolePolicy: |
                {
                  "Version": "2012-10-17",
                  "Statement": [{
                    "Effect": "Allow",
                    "Principal": {
                      "Federated": "arn:aws:iam::{{ $params.awsAccountNumber }}:oidc-provider/{{ $oidc }}"
                    },
                    "Action": "sts:AssumeRoleWithWebIdentity",
                    "Condition": {
                      "StringEquals": {
                        "{{ $oidc }}:aud": "sts.amazonaws.com",
                        "{{ $oidc }}:sub": "system:serviceaccount:kube-system:{{ $id }}-karpenter"
                      }
                    }
                  }]
                }
          ---
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: Policy
          metadata:
            name: {{ $id }}-karpenter-policy
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-policy-karpenter
          spec:
            forProvider:
              policy: |
                {
                  "Version": "2012-10-17",
                  "Statement": [
                    {"Effect":"Allow","Action":["ec2:CreateLaunchTemplate","ec2:CreateFleet","ec2:RunInstances","ec2:CreateTags","ec2:TerminateInstances","ec2:DeleteLaunchTemplate","ec2:DescribeLaunchTemplates","ec2:DescribeInstances","ec2:DescribeSecurityGroups","ec2:DescribeSubnets","ec2:DescribeImages","ec2:DescribeInstanceTypes","ec2:DescribeInstanceTypeOfferings","ec2:DescribeAvailabilityZones","ec2:DescribeSpotPriceHistory","ec2:DescribeInstanceAttribute","ec2:DescribeInterruptionEventQueues","ec2:DescribeCapacityReservations","ec2:DescribeNetworkInterfaces","sqs:DeleteMessage","sqs:GetQueueUrl","sqs:GetQueueAttributes","sqs:ReceiveMessage","iam:PassRole","iam:CreateInstanceProfile","iam:TagInstanceProfile","iam:AddRoleToInstanceProfile","iam:RemoveRoleFromInstanceProfile","iam:DeleteInstanceProfile","iam:GetInstanceProfile","iam:ListInstanceProfiles","iam:ListInstanceProfilesForRole","ssm:GetParameter","ssm:GetParameters","ssm:GetParametersByPath","pricing:GetProducts"],"Resource":"*"},
                    {"Effect":"Allow","Action":["eks:DescribeCluster"],"Resource":"*"}
                  ]
                }
          ---
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: RolePolicyAttachment
          metadata:
            name: {{ $id }}-karpenter-policy-attachment
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-karpenter-policy-attachment
          spec:
            forProvider:
              roleRef:
                name: {{ $id }}-karpenter
              policyArnRef:
                name: {{ $id }}-karpenter-policy
          {{- end }}
          ---
          # EKS Cluster
          apiVersion: eks.aws.upbound.io/v1beta2
          kind: Cluster
          metadata:
            name: {{ $id }}
            labels:
              resource: cluster
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-ekscluster
          spec:
            deletionPolicy: Delete
            forProvider:
              region: {{ $params.region }}
              version: {{ $params.version | default "1.35" | quote }}
              accessConfig:
                authenticationMode: API_AND_CONFIG_MAP
                bootstrapClusterCreatorAdminPermissions: true
              vpcConfig:
                {{- if $existingVpcId }}
                subnetIds: {{ $subnetIds | toJson }}
                {{- else }}
                subnetIdRefs:
                {{- range $i, $az := $azs }}
                - name: {{ $id }}-subnet-private-{{ $i }}
                - name: {{ $id }}-subnet-public-{{ $i }}
                {{- end }}
                {{- end }}
                endpointPrivateAccess: true
                endpointPublicAccess: true
              roleArnRef:
                name: {{ $id }}-controlplane
          ---
          # System node group (CriticalAddonsOnly taint — for kube-system / Istio / Agones system pods)
          apiVersion: eks.aws.upbound.io/v1beta2
          kind: NodeGroup
          metadata:
            name: {{ $id }}-system-ng
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-system-ng
          spec:
            forProvider:
              region: {{ $params.region }}
              clusterNameRef:
                name: {{ $id }}
              nodeRoleArnRef:
                name: {{ $id }}-nodegroup
              {{- if $existingVpcId }}
              subnetIds: {{ $subnetPrivateIds | toJson }}
              {{- else }}
              subnetIdRefs:
              {{- range $i, $az := $azs }}
              - name: {{ $id }}-subnet-private-{{ $i }}
              {{- end }}
              {{- end }}
              capacityType: ON_DEMAND
              scalingConfig:
                minSize: {{ $params.systemMinNodeCount | default 2 }}
                maxSize: {{ $params.systemMaxNodeCount | default 6 }}
                desiredSize: {{ $params.systemMinNodeCount | default 2 }}
              taint:
              - effect: NO_SCHEDULE
                key: CriticalAddonsOnly
          {{- /* Read the EKS-managed cluster security group ID from status once the cluster is ready.
               atProvider.vpcConfig is a list of maps in upbound provider-aws. */ -}}
          {{- $clusterSgId := "" }}
          {{- $clusterResForSg := get .observed.resources (print $id "-ekscluster") | default dict }}
          {{- if and $clusterResForSg $clusterResForSg.resource $clusterResForSg.resource.status $clusterResForSg.resource.status.atProvider }}
            {{- $vpcCfgMap := index $clusterResForSg.resource.status.atProvider "vpcConfig" | default dict }}
            {{- $clusterSgId = index $vpcCfgMap "clusterSecurityGroupId" | default "" }}
          {{- end }}
          {{- if $clusterSgId }}
          ---
          # Security group rule: Agones game server UDP port range
          apiVersion: ec2.aws.upbound.io/v1beta1
          kind: SecurityGroupRule
          metadata:
            name: {{ $id }}-sgr-gameserver-udp
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-sgr-gameserver-udp
          spec:
            forProvider:
              region: {{ $params.region }}
              cidrBlocks: ["0.0.0.0/0"]
              fromPort: 7000
              toPort: 8000
              protocol: udp
              type: ingress
              securityGroupId: {{ $clusterSgId }}
          ---
          # Security group rule: Istio east-west gateway port (cross-cluster mTLS tunnel)
          apiVersion: ec2.aws.upbound.io/v1beta1
          kind: SecurityGroupRule
          metadata:
            name: {{ $id }}-sgr-istio-eastwest
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-sgr-istio-eastwest
          spec:
            forProvider:
              region: {{ $params.region }}
              cidrBlocks: ["0.0.0.0/0"]
              fromPort: 15443
              toPort: 15443
              protocol: tcp
              type: ingress
              securityGroupId: {{ $clusterSgId }}
          ---
          # Security group rule: Istio east-west gateway health check port
          apiVersion: ec2.aws.upbound.io/v1beta1
          kind: SecurityGroupRule
          metadata:
            name: {{ $id }}-sgr-istio-eastwest-health
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-sgr-istio-eastwest-health
          spec:
            forProvider:
              region: {{ $params.region }}
              cidrBlocks: ["0.0.0.0/0"]
              fromPort: 15021
              toPort: 15021
              protocol: tcp
              type: ingress
              securityGroupId: {{ $clusterSgId }}
          {{- end }}
          ---
          # Cluster auth — writes kubeconfig to a Secret consumed by k8s/helm ProviderConfigs
          apiVersion: eks.aws.upbound.io/v1beta1
          kind: ClusterAuth
          metadata:
            name: {{ $id }}-clusterauth
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-clusterauth
          spec:
            forProvider:
              region: {{ $params.region }}
              clusterNameRef:
                name: {{ $id }}
            writeConnectionSecretToRef:
              name: {{ $id }}-kubeconfig
              namespace: crossplane-system
          ---
          # Kubernetes ProviderConfig — used by all Object resources targeting this cluster
          apiVersion: kubernetes.crossplane.io/v1alpha1
          kind: ProviderConfig
          metadata:
            name: {{ $id }}-kubernetes
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-providerconfig-k8s
              gotemplating.fn.crossplane.io/ready: "True"
          spec:
            credentials:
              source: Secret
              secretRef:
                name: {{ $id }}-kubeconfig
                namespace: crossplane-system
                key: kubeconfig
          ---
          # Helm ProviderConfig — used by all Release resources targeting this cluster
          apiVersion: helm.crossplane.io/v1beta1
          kind: ProviderConfig
          metadata:
            name: {{ $id }}-helm
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-providerconfig-helm
              gotemplating.fn.crossplane.io/ready: "True"
          spec:
            credentials:
              source: Secret
              secretRef:
                name: {{ $id }}-kubeconfig
                namespace: crossplane-system
                key: kubeconfig
          ---
          # CoreDNS addon
          apiVersion: eks.aws.upbound.io/v1beta1
          kind: Addon
          metadata:
            name: {{ $id }}-coredns
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-coredns
          spec:
            forProvider:
              region: {{ $params.region }}
              clusterNameRef:
                name: {{ $id }}
              addonName: coredns
              addonVersion: {{ $params.corednsAddonVersion | default "v1.13.1-eksbuild.1" }}
          ---
          # VPC CNI addon
          apiVersion: eks.aws.upbound.io/v1beta1
          kind: Addon
          metadata:
            name: {{ $id }}-vpccni
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-vpccni
          spec:
            forProvider:
              region: {{ $params.region }}
              clusterNameRef:
                name: {{ $id }}
              addonName: vpc-cni
              addonVersion: {{ $params.vpccniAddonVersion | default "v1.21.1-eksbuild.1" }}
          ---
          # kube-proxy addon
          apiVersion: eks.aws.upbound.io/v1beta1
          kind: Addon
          metadata:
            name: {{ $id }}-kubeproxy
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-kubeproxy
          spec:
            forProvider:
              region: {{ $params.region }}
              clusterNameRef:
                name: {{ $id }}
              addonName: kube-proxy
              addonVersion: {{ $params.kubeproxyAddonVersion | default "v1.35.0-eksbuild.2" }}
          ---
          # EBS CSI driver addon
          apiVersion: eks.aws.upbound.io/v1beta1
          kind: Addon
          metadata:
            name: {{ $id }}-ebs-csi-driver
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-ebs-csi-driver
          spec:
            forProvider:
              region: {{ $params.region }}
              clusterNameRef:
                name: {{ $id }}
              addonName: aws-ebs-csi-driver
              addonVersion: {{ $params.ebsCsiDriverAddonVersion | default "v1.56.0-eksbuild.1" }}
          {{- if $oidc }}
          ---
          # IAM Role for aws-load-balancer-controller (IRSA)
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: Role
          metadata:
            name: {{ $id }}-aws-lbc
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-role-aws-lbc
          spec:
            forProvider:
              assumeRolePolicy: |
                {
                  "Version": "2012-10-17",
                  "Statement": [{
                    "Effect": "Allow",
                    "Principal": {
                      "Federated": "arn:aws:iam::{{ $params.awsAccountNumber }}:oidc-provider/{{ $oidc }}"
                    },
                    "Action": "sts:AssumeRoleWithWebIdentity",
                    "Condition": {
                      "StringEquals": {
                        "{{ $oidc }}:aud": "sts.amazonaws.com",
                        "{{ $oidc }}:sub": "system:serviceaccount:kube-system:aws-load-balancer-controller"
                      }
                    }
                  }]
                }
          ---
          # aws-load-balancer-controller needs broad ELB + EC2 permissions.
          # Using the official AWS managed policy to avoid maintaining a permission list.
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: RolePolicyAttachment
          metadata:
            name: {{ $id }}-aws-lbc-elb-full
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-aws-lbc-elb-full
          spec:
            forProvider:
              policyArn: arn:aws:iam::aws:policy/ElasticLoadBalancingFullAccess
              roleRef:
                name: {{ $id }}-aws-lbc
          ---
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: RolePolicyAttachment
          metadata:
            name: {{ $id }}-aws-lbc-ec2-ro
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-aws-lbc-ec2-ro
          spec:
            forProvider:
              policyArn: arn:aws:iam::aws:policy/AmazonEC2ReadOnlyAccess
              roleRef:
                name: {{ $id }}-aws-lbc
          {{- end }}
          ---
          # aws-load-balancer-controller — provisions NLBs and ALBs via Service/Ingress annotations
          apiVersion: helm.crossplane.io/v1beta1
          kind: Release
          metadata:
            name: {{ $id }}-aws-lbc
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-aws-lbc
          spec:
            providerConfigRef:
              name: {{ $id }}-helm
            forProvider:
              chart:
                name: aws-load-balancer-controller
                repository: https://aws.github.io/eks-charts
                version: "1.13.0"
              namespace: kube-system
              values:
                clusterName: {{ $id }}
                region: {{ $params.region }}
                {{- if $vpcId }}
                vpcId: {{ $vpcId }}
                {{- end }}
                serviceAccount:
                  name: aws-load-balancer-controller
                  annotations:
                    eks.amazonaws.com/role-arn: "arn:aws:iam::{{ $params.awsAccountNumber }}:role/{{ $id }}-aws-lbc"
                tolerations:
                - key: CriticalAddonsOnly
                  operator: Exists
          ---
          # Karpenter — node autoscaler for game server and Istio node pools
          apiVersion: helm.crossplane.io/v1beta1
          kind: Release
          metadata:
            name: {{ $id }}-karpenter
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-karpenter
          spec:
            providerConfigRef:
              name: {{ $id }}-helm
            forProvider:
              chart:
                name: karpenter
                repository: oci://public.ecr.aws/karpenter
                version: {{ $params.karpenterVersion | default "1.13.0" }}
              namespace: kube-system
              values:
                settings:
                  clusterName: {{ $id }}
                  clusterEndpoint: {{ $endpoint | default "" | quote }}
                serviceAccount:
                  annotations:
                    eks.amazonaws.com/role-arn: "arn:aws:iam::{{ $params.awsAccountNumber }}:role/{{ $id }}-karpenter"
                controller:
                  env:
                  - name: AWS_REGION
                    value: {{ $params.region }}
                tolerations:
                - key: CriticalAddonsOnly
                  operator: Exists
          ---
          # cert-manager — required for Agones webhook certs and Istio CA
          apiVersion: helm.crossplane.io/v1beta1
          kind: Release
          metadata:
            name: {{ $id }}-cert-manager
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-cert-manager
          spec:
            providerConfigRef:
              name: {{ $id }}-helm
            forProvider:
              chart:
                name: cert-manager
                repository: https://charts.jetstack.io
                version: "v1.17.2"
              namespace: cert-manager
              values:
                installCRDs: true
                global:
                  tolerations:
                  - key: CriticalAddonsOnly
                    operator: Exists
                tolerations:
                - key: CriticalAddonsOnly
                  operator: Exists
                webhook:
                  tolerations:
                  - key: CriticalAddonsOnly
                    operator: Exists
                cainjector:
                  tolerations:
                  - key: CriticalAddonsOnly
                    operator: Exists
                startupapicheck:
                  tolerations:
                  - key: CriticalAddonsOnly
                    operator: Exists
          ---
          # Self-signed ClusterIssuer for Agones webhook and allocator certs
          apiVersion: kubernetes.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: {{ $id }}-selfsigned-issuer
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-selfsigned-issuer
          spec:
            providerConfigRef:
              name: {{ $id }}-kubernetes
            forProvider:
              manifest:
                apiVersion: cert-manager.io/v1
                kind: ClusterIssuer
                metadata:
                  name: selfsigned
                spec:
                  selfSigned: {}

          {{- $istio := get $params "istio" | default dict }}
          {{- $istioEnabled := index $istio "enabled" | default false }}
          {{- $istioPrimary := index $istio "primary" | default false }}

          {{- if and $istioEnabled $istioPrimary }}
          ---
          # ── PRIMARY CLUSTER ONLY ──────────────────────────────────────────────────
          # Create the shared Istio root CA in the management cluster's cert-manager.
          apiVersion: kubernetes.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: {{ $id }}-istio-root-ca-selfsigned-issuer
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-istio-root-ca-selfsigned-issuer
          spec:
            providerConfigRef:
              name: default
            forProvider:
              manifest:
                apiVersion: cert-manager.io/v1
                kind: ClusterIssuer
                metadata:
                  name: istio-root-ca-selfsigned
                spec:
                  selfSigned: {}
          ---
          apiVersion: kubernetes.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: {{ $id }}-istio-root-ca-cert
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-istio-root-ca-cert
          spec:
            providerConfigRef:
              name: default
            forProvider:
              manifest:
                apiVersion: cert-manager.io/v1
                kind: Certificate
                metadata:
                  name: istio-ca
                  namespace: cert-manager
                spec:
                  isCA: true
                  commonName: istio-ca
                  secretName: istio-ca
                  duration: 87600h
                  renewBefore: 720h
                  privateKey:
                    algorithm: ECDSA
                    size: 256
                  issuerRef:
                    name: istio-root-ca-selfsigned
                    kind: ClusterIssuer
                    group: cert-manager.io
          {{- end }}

          {{- $agonesEnabled := index $agones "enabled" | default false }}

          {{- if $agonesEnabled }}
          ---
          # ── AGONES nested XR ──────────────────────────────────────────────────────
          apiVersion: demo.crossplane.io/v1alpha1
          kind: XAgonesCluster
          metadata:
            name: {{ $id }}-agones
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-agones-xr
          spec:
            id: {{ $id }}
            parameters:
              region: {{ $params.region }}
              awsAccountNumber: {{ $params.awsAccountNumber | quote }}
              version: {{ index $agones "version" | default "1.55.0" }}
              vpc_subnet_selector_private: {{ $subnetSelectorPrivate }}
              vpc_subnet_selector_public: {{ $subnetSelectorPublic }}
              {{- if $oidc }}
              oidc: {{ $oidc }}
              {{- end }}
              istio:
                enabled: {{ $istioEnabled }}
              replicas:
                allocator: {{ index (index $agones "replicas" | default dict) "allocator" | default 1 }}
                controller: {{ index (index $agones "replicas" | default dict) "controller" | default 1 }}
                extensions: {{ index (index $agones "replicas" | default dict) "extensions" | default 1 }}
                ping: 1
              {{- if index $agones "karpenterNodePools" }}
              karpenterNodePools: {{ index $agones "karpenterNodePools" | toJson }}
              {{- end }}
          {{- end }}

          {{- if $istioEnabled }}
          ---
          # ── ISTIO nested XR ───────────────────────────────────────────────────────
          apiVersion: demo.crossplane.io/v1alpha1
          kind: XIstio
          metadata:
            name: {{ $id }}-istio
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: {{ $id }}-istio-xr
          spec:
            id: {{ $id }}
            parameters:
              region: {{ $params.region }}
              version: {{ index $istio "version" | default "1.26.2" }}
              meshID: {{ index $istio "meshID" }}
              clusterEndpoint: {{ $endpoint | quote }}
              certificateAuthorityData: {{ $caData | quote }}
              awsAccountNumber: {{ $params.awsAccountNumber | quote }}
              multicluster: {{ index $istio "multicluster" | default dict | toJson }}
          {{- end }}

  - step: automaticallyDetectReadyComposedResources
    functionRef:
      name: function-auto-ready
