apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xkubernetesclusters.demo.crossplane.io
spec:
  defaultCompositionRef:
    name: xkubernetes-aws
  group: demo.crossplane.io
  names:
    kind: XKubernetesCluster
    plural: xkubernetesclusters
  claimNames:
    kind: KubernetesCluster
    plural: kubernetesclusters
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              id:
                type: string
                description: ID of this Cluster that other objects will use to refer to it.
              parameters:
                type: object
                properties:
                  version:
                    description: The Kubernetes version for the cluster.
                    type: string
                    default: "1.35"
                  region:
                    description: AWS region for the cluster.
                    type: string

                  # ── Networking ─────────────────────────────────────────────
                  # When vpcId is omitted a new VPC is created via the vpc package.
                  # vpc.cidr selects which /16 block to use (one per cluster).
                  vpc:
                    description: |
                      VPC configuration. When vpcId is not provided a new VPC is
                      created automatically using the vpc Crossplane package.
                    type: object
                    properties:
                      cidr:
                        description: CIDR for the new VPC (e.g. 10.100.0.0/16).
                        type: string
                        default: "10.100.0.0/16"
                      availabilityZones:
                        description: AZs to create subnets in.
                        type: array
                        items:
                          type: string

                  # Explicit subnet overrides — omit to use auto-created subnets.
                  vpcId:
                    description: Existing VPC Id. Leave empty to create a new VPC.
                    type: string
                  subnetIds:
                    description: All subnet IDs (public + private). Leave empty to use auto-created subnets.
                    items:
                      type: string
                    type: array
                  subnetPrivateIds:
                    description: Private subnet IDs. Leave empty to use auto-created subnets.
                    items:
                      type: string
                    type: array
                  subnetPublicIds:
                    description: Public subnet IDs. Leave empty to use auto-created subnets.
                    items:
                      type: string
                    type: array

                  awsAccountNumber:
                    description: AWS account number.
                    type: string
                  systemNodeSize:
                    description: System node instance size profile.
                    type: string
                    enum:
                    - small    # t3a.medium
                    - medium   # t3a.xlarge
                    - large    # t3a.2xlarge
                    default: medium
                  systemMinNodeCount:
                    type: integer
                    default: 2
                  systemMaxNodeCount:
                    type: integer
                    default: 6
                  karpenterVersion:
                    description: Karpenter Helm chart version.
                    type: string
                    default: "1.13.0"
                  corednsAddonVersion:
                    type: string
                    default: "v1.13.1-eksbuild.1"
                  kubeproxyAddonVersion:
                    type: string
                    default: "v1.35.0-eksbuild.2"
                  vpccniAddonVersion:
                    type: string
                    default: "v1.21.1-eksbuild.1"
                  ebsCsiDriverAddonVersion:
                    type: string
                    default: "v1.56.0-eksbuild.1"

                  istio:
                    description: |
                      Istio service mesh configuration.
                      When enabled, the Composition installs istiod and the east-west gateway
                      via the istio Crossplane package, then wires up multicluster routing.
                    type: object
                    properties:
                      enabled:
                        type: boolean
                        default: false
                      version:
                        type: string
                        default: "1.26.2"
                      meshID:
                        description: |
                          Shared mesh ID. Must be identical on every cluster in the mesh.
                        type: string
                      primary:
                        description: |
                          Mark this cluster as the primary (root CA owner).
                          When true the Composition creates the shared Istio root CA
                          via cert-manager. All other clusters must set primary: false
                          and will receive the CA via Crossplane namespace references.
                          Exactly one cluster per mesh should be primary: true.
                        type: boolean
                        default: false
                      multicluster:
                        type: object
                        properties:
                          enabled:
                            type: boolean
                            default: false
                          rules:
                            description: |
                              List of peer clusters to connect via east-west gateway.
                              Each entry generates remote-secret copy and routing rules
                              (DestinationRule + VirtualService) for Agones allocator.
                            type: array
                            items:
                              type: object
                              properties:
                                clusterName:
                                  type: string
                                region:
                                  type: string
                                agonesNamespace:
                                  type: string
                                  default: agones-system
                                istioNamespace:
                                  type: string
                                  default: istio-system
                                gatewayServiceName:
                                  type: string
                    required:
                    - version
                    - meshID

                  agones:
                    description: |
                      Agones game server framework configuration.
                      When enabled, the Composition installs Agones via the agones
                      Crossplane package with Agones allocator and Karpenter NodePools
                      for dedicated game server nodes.
                    type: object
                    properties:
                      enabled:
                        type: boolean
                        default: false
                      version:
                        type: string
                        default: "1.55.0"
                      replicas:
                        type: object
                        properties:
                          allocator:
                            type: integer
                            default: 1
                          controller:
                            type: integer
                            default: 1
                          extensions:
                            type: integer
                            default: 1
                      vpcSubnetSelectorPublic:
                        description: |
                          Karpenter subnet selector tag for game server nodes.
                          Game server pods need public IPs for UDP reachability.
                          Defaults to <first-az>-public when using auto-created VPC.
                        type: string
                      vpcSubnetSelectorPrivate:
                        description: Karpenter subnet selector tag for Agones system nodes.
                        type: string
                      karpenterNodePools:
                        description: Karpenter NodePools for game server workloads.
                        type: array
                        items:
                          type: object
                          properties:
                            nodePoolName:
                              type: string
                            weight:
                              type: string
                              default: "50"
                            nodeclass:
                              type: object
                              properties:
                                volumeEnabled:
                                  type: boolean
                                volumeSize:
                                  type: string
                                  default: "30Gi"
                                iops:
                                  type: string
                                  default: "3000"
                                throughput:
                                  type: string
                                  default: "125"
                                amiFamily:
                                  type: string
                                  default: Bottlerocket
                                amiAlias:
                                  type: string
                                  default: bottlerocket@latest
                                deviceName:
                                  type: string
                                  default: "/dev/xvdb"
                              required:
                              - volumeEnabled
                            limits:
                              type: object
                              properties:
                                cpu:
                                  type: string
                                memory:
                                  type: string
                              required:
                              - cpu
                              - memory
                            capacityType:
                              type: array
                              items:
                                type: string
                            instanceCategory:
                              type: array
                              items:
                                type: string
                              default: []
                            instanceCpu:
                              type: array
                              items:
                                type: string
                              default: []
                            instanceArch:
                              type: array
                              items:
                                type: string
                            taintKey:
                              type: string
                          required:
                          - nodeclass
                          - nodePoolName
                          - limits
                          - capacityType
                          - instanceArch
                          - taintKey

                required:
                - region
                - awsAccountNumber
            required:
            - id
            - parameters
          status:
            type: object
            properties:
              values:
                type: object
                x-kubernetes-preserve-unknown-fields: true
              clusterName:
                type: string
              controlPlaneStatus:
                type: string
              vpcId:
                type: string
