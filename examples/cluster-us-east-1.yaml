apiVersion: demo.crossplane.io/v1alpha1
kind: KubernetesCluster
metadata:
  name: gameserver-us-east-1
  namespace: demo
spec:
  id: gameserver-us-east-1
  parameters:
    region: us-east-1
    version: "1.35"
    awsAccountNumber: "123456789012"

    # VPC is created automatically. Use a different /16 per cluster.
    vpc:
      cidr: "10.110.0.0/16"
      availabilityZones:
      - us-east-1a
      - us-east-1b

    systemNodeSize: medium
    systemMinNodeCount: 2
    systemMaxNodeCount: 4

    karpenterVersion: "1.13.0"
    corednsAddonVersion: "v1.13.1-eksbuild.1"
    kubeproxyAddonVersion: "v1.35.0-eksbuild.2"
    vpccniAddonVersion: "v1.21.1-eksbuild.1"
    ebsCsiDriverAddonVersion: "v1.56.0-eksbuild.1"

    istio:
      enabled: true
      version: "1.26.2"
      meshID: demo-mesh
      # primary: true — this cluster creates the shared Istio root CA in cert-manager
      # on the management cluster. Set to false on all other clusters in the mesh.
      primary: true
      multicluster:
        enabled: true
        rules:
        - clusterName: gameserver-eu-west-1
          region: eu-west-1
          agonesNamespace: agones-system
          istioNamespace: istio-system

    agones:
      enabled: true
      version: "1.55.0"
      replicas:
        allocator: 3
        controller: 3
        extensions: 2
      karpenterNodePools:
      - nodePoolName: gameservers-arm64
        weight: "100"
        nodeclass:
          volumeEnabled: true
          volumeSize: "30Gi"
          iops: "3000"
          throughput: "125"
          amiFamily: Bottlerocket
          amiAlias: bottlerocket@latest
          deviceName: "/dev/xvdb"
        limits:
          cpu: "200"
          memory: "800Gi"
        capacityType:
        - spot
        - on-demand
        instanceCategory:
        - c
        - m
        instanceCpu:
        - "4"
        - "8"
        - "16"
        instanceArch:
        - arm64
        taintKey: agones.dev/agones-gameservers-arm64
