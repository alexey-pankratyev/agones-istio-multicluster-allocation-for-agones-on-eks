apiVersion: demo.crossplane.io/v1alpha1
kind: KubernetesCluster
metadata:
  name: gameserver-eu-west-1
  namespace: demo
spec:
  id: gameserver-eu-west-1
  parameters:
    region: eu-west-1
    version: "1.35"
    awsAccountNumber: "123456789012"

    # VPC is created automatically. Each cluster uses its own /16 range.
    vpc:
      cidr: "10.100.0.0/16"
      availabilityZones:
      - eu-west-1a
      - eu-west-1b

    systemNodeSize: medium
    systemMinNodeCount: 2
    systemMaxNodeCount: 4

    karpenterVersion: "1.13.0"
    corednsAddonVersion: "v1.13.1-eksbuild.1"
    kubeproxyAddonVersion: "v1.35.0-eksbuild.2"
    vpccniAddonVersion: "v1.21.1-eksbuild.1"
    ebsCsiDriverAddonVersion: "v1.56.0-eksbuild.1"

    istio:
      enabled: true
      version: "1.26.2"
      meshID: demo-mesh
      # primary: false — this cluster receives the shared CA from the management cluster.
      # The CA was created by the primary cluster (us-east-1).
      primary: false
      multicluster:
        enabled: true
        rules:
        - clusterName: gameserver-us-east-1
          region: us-east-1
          agonesNamespace: agones-system
          istioNamespace: istio-system

    agones:
      enabled: true
      version: "1.55.0"
      # Subnet selectors default to <first-az> and <first-az>-public when using
      # auto-created VPC, so these fields can be omitted.
      replicas:
        allocator: 3
        controller: 3
        extensions: 2
      karpenterNodePools:
      - nodePoolName: gameservers-arm64
        weight: "100"
        nodeclass:
          volumeEnabled: true
          volumeSize: "30Gi"
          iops: "3000"
          throughput: "125"
          amiFamily: Bottlerocket
          amiAlias: bottlerocket@1.57.0
          deviceName: "/dev/xvdb"
        limits:
          cpu: "200"
          memory: "800Gi"
        capacityType:
        - spot
        - on-demand
        instanceCategory:
        - c
        - m
        instanceCpu:
        - "4"
        - "8"
        - "16"
        instanceArch:
        - arm64
        taintKey: agones.dev/agones-gameservers-arm64
